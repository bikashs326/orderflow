<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrderFlow — Service Order Management</title>
  <style>
    /* ── Reset & Base ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; color: #1a202c; min-height: 100vh; }

    /* ── Design Tokens ── */
    :root {
      --primary: #4f46e5; --primary-dark: #3730a3; --primary-light: #e0e7ff;
      --success: #059669; --success-light: #d1fae5;
      --warning: #d97706; --warning-light: #fef3c7;
      --danger: #dc2626; --danger-light: #fee2e2;
      --info: #0891b2; --info-light: #cffafe;
      --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb; --gray-300:#d1d5db;
      --gray-400:#9ca3af; --gray-500:#6b7280; --gray-600:#4b5563;
      --gray-700:#374151; --gray-800:#1f2937; --gray-900:#111827;
      --sidebar-w: 240px;
      --r: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 6px rgba(0,0,0,.07);
      --shadow-lg: 0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
    }

    /* ── Utilities ── */
    .hidden { display: none !important; }

    /* ══════════════════════════════════════
       LOGIN
    ══════════════════════════════════════ */
    .login-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    }
    .login-card {
      background: #fff; border-radius: 16px; padding: 48px 40px;
      width: 100%; max-width: 400px; box-shadow: var(--shadow-lg);
    }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo h1 { font-size: 28px; font-weight: 800; color: var(--primary); }
    .login-logo p { color: var(--gray-500); font-size: 14px; margin-top: 4px; }
    .error-msg {
      background: var(--danger-light); color: var(--danger);
      padding: 10px 14px; border-radius: var(--r); font-size: 13px;
      margin-bottom: 16px; display: none;
    }

    /* ── Form elements (shared) ── */
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-700); margin-bottom: 5px; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--gray-200);
      border-radius: var(--r); font-size: 14px; color: var(--gray-800);
      transition: border-color .2s; background: #fff;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,.1);
    }
    .form-group textarea { resize: vertical; min-height: 78px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid .span-2 { grid-column: span 2; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 20px; border-radius: var(--r);
      font-size: 14px; font-weight: 600; cursor: pointer;
      border: none; transition: all .15s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-outline { background: #fff; color: var(--gray-700); border: 1.5px solid var(--gray-200); }
    .btn-outline:hover { background: var(--gray-50); }
    .btn-ghost { background: var(--gray-100); color: var(--gray-700); }
    .btn-ghost:hover { background: var(--gray-200); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-full { width: 100%; justify-content: center; }

    /* ══════════════════════════════════════
       APP SHELL
    ══════════════════════════════════════ */
    .app { display: flex; min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w); background: var(--gray-900); color: #fff;
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
    }
    .sidebar-logo { padding: 22px 20px; border-bottom: 1px solid rgba(255,255,255,.08); }
    .sidebar-logo h2 { font-size: 18px; font-weight: 800; }
    .sidebar-logo p { font-size: 11px; color: var(--gray-400); margin-top: 3px; }
    .sidebar-nav { flex: 1; padding: 14px 0; overflow-y: auto; }
    .nav-item {
      display: flex; align-items: center; gap: 11px;
      padding: 11px 20px; color: var(--gray-400); cursor: pointer;
      font-size: 14px; font-weight: 500; transition: all .15s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,.05); }
    .nav-item.active { color: #fff; background: rgba(79,70,229,.3); border-left-color: var(--primary); }
    .nav-item svg { width: 17px; height: 17px; flex-shrink: 0; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.08); }
    .sidebar-user { font-size: 12px; color: var(--gray-400); margin-bottom: 11px; }
    .sidebar-user strong { color: #fff; display: block; font-size: 13px; margin-top: 1px; }

    /* ── Main ── */
    .main { margin-left: var(--sidebar-w); flex: 1; padding: 28px 28px 60px; }

    /* ── Page header ── */
    .page-header {
      display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px;
    }
    .page-header h1 { font-size: 22px; font-weight: 800; color: var(--gray-900); }
    .page-header p { font-size: 13px; color: var(--gray-500); margin-top: 2px; }

    /* ══════════════════════════════════════
       STAT CARDS
    ══════════════════════════════════════ */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(165px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    .stat-card { background: #fff; border-radius: var(--r); padding: 20px; box-shadow: var(--shadow); }
    .stat-card .s-label { font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: .06em; }
    .stat-card .s-value { font-size: 30px; font-weight: 800; margin: 4px 0 2px; }
    .stat-card .s-sub { font-size: 12px; color: var(--gray-400); }
    .sc-accepted .s-value { color: var(--gray-600); }
    .sc-progress .s-value { color: var(--primary); }
    .sc-ready    .s-value { color: var(--info); }
    .sc-overdue  .s-value { color: var(--danger); }
    .sc-done     .s-value { color: var(--success); }
    .sc-amount   .s-value { color: var(--gray-800); font-size: 22px; }

    /* ══════════════════════════════════════
       SEARCH / FILTER BAR
    ══════════════════════════════════════ */
    .search-bar {
      background: #fff; border-radius: var(--r); padding: 14px 16px;
      box-shadow: var(--shadow); margin-bottom: 18px;
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    .search-bar input {
      flex: 1 1 220px; border: 1.5px solid var(--gray-200);
      border-radius: var(--r); padding: 9px 14px; font-size: 14px; min-width: 0;
    }
    .search-bar input:focus { outline: none; border-color: var(--primary); }
    .search-bar select {
      border: 1.5px solid var(--gray-200); border-radius: var(--r);
      padding: 9px 12px; font-size: 13px; background: #fff;
    }

    /* ══════════════════════════════════════
       CARD + TABLE
    ══════════════════════════════════════ */
    .card { background: #fff; border-radius: var(--r); box-shadow: var(--shadow); overflow: hidden; }
    .card-header {
      padding: 15px 20px; border-bottom: 1px solid var(--gray-100);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-header h3 { font-size: 15px; font-weight: 700; }

    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 700;
      color: var(--gray-500); text-transform: uppercase; letter-spacing: .05em;
      background: var(--gray-50); border-bottom: 1px solid var(--gray-100);
      white-space: nowrap;
    }
    td {
      padding: 12px 16px; font-size: 13px;
      border-bottom: 1px solid var(--gray-50); color: var(--gray-700);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gray-50); }
    tr.row-overdue td { background: #fff8f8; }
    tr.row-overdue:hover td { background: var(--danger-light); }

    .action-btns { display: flex; gap: 6px; }
    .overdue-tag { color: var(--danger); font-size: 10px; font-weight: 700; }

    /* ══════════════════════════════════════
       BADGES
    ══════════════════════════════════════ */
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    }
    .b-accepted  { background: var(--gray-100);    color: var(--gray-600); }
    .b-progress  { background: var(--primary-light); color: var(--primary-dark); }
    .b-ready     { background: var(--info-light);   color: var(--info); }
    .b-delivered { background: var(--success-light); color: var(--success); }
    .b-closed    { background: var(--gray-100);     color: var(--gray-400); }
    .b-paid      { background: var(--success-light); color: var(--success); }
    .b-partial   { background: var(--warning-light); color: var(--warning); }
    .b-unpaid    { background: var(--danger-light);  color: var(--danger); }

    /* ══════════════════════════════════════
       MODAL
    ══════════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal {
      background: #fff; border-radius: 12px; width: 100%; max-width: 580px;
      max-height: 92vh; overflow-y: auto; box-shadow: var(--shadow-lg);
    }
    .modal-header {
      padding: 18px 24px; border-bottom: 1px solid var(--gray-100);
      display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: #fff; z-index: 1;
    }
    .modal-header h3 { font-size: 16px; font-weight: 700; }
    .modal-close {
      width: 28px; height: 28px; border-radius: 50%; background: var(--gray-100);
      border: none; cursor: pointer; font-size: 15px; color: var(--gray-500);
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: var(--gray-200); }
    .modal-body { padding: 22px 24px; }
    .modal-footer {
      padding: 14px 24px; border-top: 1px solid var(--gray-100);
      display: flex; gap: 10px; justify-content: flex-end; align-items: center;
      position: sticky; bottom: 0; background: #fff;
    }

    /* ══════════════════════════════════════
       STATUS STEPPER
    ══════════════════════════════════════ */
    .status-steps { display: flex; align-items: flex-start; gap: 0; margin: 16px 0 20px; }
    .step { flex: 1; text-align: center; position: relative; }
    .step::after {
      content: ''; position: absolute; top: 13px; left: 50%; width: 100%; height: 2px;
      background: var(--gray-200); z-index: 0;
    }
    .step:last-child::after { display: none; }
    .step-dot {
      width: 28px; height: 28px; border-radius: 50%; background: var(--gray-200);
      color: var(--gray-400); display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; margin: 0 auto 6px; position: relative; z-index: 1;
    }
    .step.s-done .step-dot { background: var(--success); color: #fff; }
    .step.s-active .step-dot { background: var(--primary); color: #fff; box-shadow: 0 0 0 4px rgba(79,70,229,.2); }
    .step-label { font-size: 10px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; }
    .step.s-done .step-label, .step.s-active .step-label { color: var(--gray-700); }

    /* ══════════════════════════════════════
       PAYMENT BOX
    ══════════════════════════════════════ */
    .pay-box { background: var(--gray-50); border-radius: var(--r); padding: 16px; margin-bottom: 16px; }
    .pay-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--gray-100); }
    .pay-row:last-child { border-bottom: none; }
    .pay-label { font-size: 13px; color: var(--gray-500); }
    .pay-val { font-size: 14px; font-weight: 700; color: var(--gray-800); }
    .pay-val.balance { color: var(--danger); }

    /* ══════════════════════════════════════
       ADMIN BUSINESS CARDS
    ══════════════════════════════════════ */
    .biz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 16px; }
    .biz-card {
      background: #fff; border-radius: var(--r); padding: 20px;
      box-shadow: var(--shadow); border: 1px solid var(--gray-100);
    }
    .biz-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .biz-meta { font-size: 12px; color: var(--gray-400); margin-bottom: 14px; }
    .biz-stats { display: flex; gap: 20px; margin-bottom: 14px; }
    .biz-stat .n { font-size: 22px; font-weight: 800; color: var(--primary); }
    .biz-stat .l { font-size: 11px; color: var(--gray-400); }
    .cred-box {
      background: var(--gray-50); border: 1px solid var(--gray-200);
      border-radius: 6px; padding: 9px 12px; font-size: 12px; color: var(--gray-600);
      font-family: monospace;
    }
    .cred-box span { color: var(--primary); font-weight: 700; }

    /* ══════════════════════════════════════
       EMPTY STATE
    ══════════════════════════════════════ */
    .empty-state { text-align: center; padding: 56px 20px; color: var(--gray-400); }
    .empty-state svg { width: 44px; height: 44px; margin: 0 auto 14px; opacity: .35; display: block; }
    .empty-state h3 { font-size: 15px; font-weight: 600; color: var(--gray-500); margin-bottom: 5px; }
    .empty-state p { font-size: 13px; }

    /* ══════════════════════════════════════
       TOAST
    ══════════════════════════════════════ */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      padding: 12px 20px; border-radius: var(--r); font-size: 13px; font-weight: 600;
      background: var(--gray-900); color: #fff; box-shadow: var(--shadow-lg);
      animation: slideUp .25s ease;
    }
    .toast.success { background: var(--success); }
    .toast.error   { background: var(--danger); }
    @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ══════════════════════════════════════
       INFO GRID (view order details)
    ══════════════════════════════════════ */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
    .info-item .i-label { font-size: 11px; color: var(--gray-400); text-transform: uppercase; font-weight: 700; letter-spacing: .05em; margin-bottom: 3px; }
    .info-item .i-val { font-size: 14px; font-weight: 600; color: var(--gray-800); }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */
    @media (max-width: 720px) {
      .sidebar { transform: translateX(-100%); }
      .main { margin-left: 0; padding: 16px; }
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .span-2 { grid-column: span 1; }
      .info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════
     LOGIN
══════════════════════════════════════ -->
<div id="loginPage" class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <h1>🖨️ OrderFlow</h1>
      <p>Service Order Management System</p>
    </div>
    <div id="loginError" class="error-msg">Invalid username or password.</div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="liUser" placeholder="Enter username" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="liPass" placeholder="Enter password" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <button class="btn btn-primary btn-full" style="margin-top:4px" onclick="doLogin()">Sign In →</button>
  </div>
</div>

<!-- ══════════════════════════════════════
     APP
══════════════════════════════════════ -->
<div id="app" class="app hidden">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h2>🖨️ OrderFlow</h2>
      <p id="sbBizName">—</p>
    </div>
    <nav class="sidebar-nav" id="sbNav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">Logged in as<br><strong id="sbUser">—</strong></div>
      <button class="btn btn-outline btn-full btn-sm" onclick="doLogout()">Sign Out</button>
    </div>
  </aside>
  <main class="main" id="mainContent"></main>
</div>

<!-- MODAL -->
<div id="modalOverlay" class="modal-overlay hidden" onclick="overlayClick(event)">
  <div class="modal" id="modalBox"></div>
</div>

<!-- TOAST -->
<div id="toastEl" class="toast hidden"></div>

// ── Storage helpers ─────────────────────────────────────────
const ls = {
  get: k => JSON.parse(localStorage.getItem(k) || 'null'),
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
  del: k => localStorage.removeItem(k),
};
const ss = {
  get: () => JSON.parse(sessionStorage.getItem('of_sess') || 'null'),
  set: v => sessionStorage.setItem('of_sess', JSON.stringify(v)),
  del: () => sessionStorage.removeItem('of_sess'),
};
const getBusinesses  = () => ls.get('of_biz') || [];
const saveBizList    = d  => ls.set('of_biz', d);
const getOrders      = id => ls.get('of_ord_' + id) || [];
const saveOrders     = (id,d) => ls.set('of_ord_' + id, d);

// ── ID generators ───────────────────────────────────────────
const genBizId = () => 'biz_' + Date.now();
function genOrderId(bizId) {
  const orders = getOrders(bizId);
  const max = orders.reduce((m,o) => {
    const n = parseInt((o.id||'').replace('ORD-','')) || 0;
    return Math.max(m, n);
  }, 0);
  return 'ORD-' + String(max + 1).padStart(4,'0');
}

// ── Utility ─────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function money(n) { return '₹' + Number(n||0).toLocaleString('en-IN'); }
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
}
function isOverdue(o) {
  if (!o.dueDate || o.closed) return false;
  const due = new Date(o.dueDate); due.setHours(23,59,59);
  return due < new Date();
}
function toast(msg, type='') {
  const el = document.getElementById('toastEl');
  el.textContent = msg; el.className = 'toast ' + type;
  el.classList.remove('hidden');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.add('hidden'), 3000);
}

// ── Session ─────────────────────────────────────────────────
let session = null;
let currentView = '';

// ══════════════════════════════════════
// AUTH
// ══════════════════════════════════════
function doLogin() {
  const u = document.getElementById('liUser').value.trim();
  const p = document.getElementById('liPass').value.trim();
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  if (u === ADMIN_CREDS.username && p === ADMIN_CREDS.password) {
    ss.set({ role:'admin', username:u, bizId:null, bizName:'Super Admin Panel' });
    bootApp(); return;
  }
  if (u === DEMO_CREDS.username && p === DEMO_CREDS.password) {
    // Ensure demo biz exists in business list
    const bizList = getBusinesses();
    if (!bizList.find(b => b.id === DEMO_CREDS.bizId)) {
      bizList.push({ id: DEMO_CREDS.bizId, name: DEMO_CREDS.bizName, username: DEMO_CREDS.username, password: DEMO_CREDS.password, active: true });
      saveBizList(bizList);
    }
    // Auto-seed demo orders if none exist on this device
    if (getOrders(DEMO_CREDS.bizId).length === 0) {
      ss.set({ role:'owner', username:u, bizId:DEMO_CREDS.bizId, bizName:DEMO_CREDS.bizName });
      session = ss.get();
      seedDemoData(true);
    }
    ss.set({ role:'owner', username:u, bizId:DEMO_CREDS.bizId, bizName:DEMO_CREDS.bizName });
    bootApp(); return;
  }
  const biz = getBusinesses().find(b => b.username === u && b.password === p && b.active !== false);
  if (biz) {
    ss.set({ role:'owner', username:u, bizId:biz.id, bizName:biz.name });
    bootApp(); return;
  }
  errEl.style.display = 'block';
}

function doLogout() { ss.del(); location.reload(); }

function bootApp() {
  session = ss.get();
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('sbUser').textContent = session.username;
  document.getElementById('sbBizName').textContent = session.bizName;
  buildSidebar();
  navigateTo(session.role === 'admin' ? 'businesses' : 'dashboard');
}

// ══════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════
function navigateTo(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-' + view);
  if (el) el.classList.add('active');
  const main = document.getElementById('mainContent');
  if      (view === 'businesses')  main.innerHTML = renderAdminBiz();
  else if (view === 'adminOrders') main.innerHTML = renderAdminOrders();
  else if (view === 'dashboard')   main.innerHTML = renderDashboard();
  else if (view === 'orders')      main.innerHTML = renderOrders(false);
  else if (view === 'history')     main.innerHTML = renderOrders(true);
  else if (view === 'revenue')     main.innerHTML = renderRevenue();
}

    progress:  active.filter(o => o.status === 'In Progress').length,
    ready:     active.filter(o => o.status === 'Ready').length,
    overdue:   active.filter(o => isOverdue(o)).length,
    closedToday: orders.filter(o => o.closed && new Date(o.closedAt).toDateString() === todayStr).length,
    balance:   active.reduce((s,o) => s + Math.max(0, o.totalAmount - o.advancePaid), 0),
  };

  return `

  const fTy   = tyEl ? tyEl.value  : '';

  let list = allOrders.filter(o => isHistory ? o.closed : !o.closed);
  if (q)   list = list.filter(o =>
    o.id.toLowerCase().includes(q) ||
    o.customerMobile.includes(q)   ||
    o.customerName.toLowerCase().includes(q) ||

      <div class="action-btns">
        <button class="btn btn-ghost btn-sm" onclick="viewOrder('${esc(o.id)}')">View</button>
        ${!isHistory ? `<button class="btn btn-outline btn-sm" onclick="showEditOrder('${esc(o.id)}')">Edit</button>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="duplicateOrder('${esc(o.id)}')">↗ Reorder</button>
      </div>
    </td>
  </tr>`;
}

// ══════════════════════════════════════
// BADGES & HELPERS
// ══════════════════════════════════════
function statusBadge(o) {
  if (o.closed) return `<span class="badge b-closed">Closed</span>`;
  const m = {'Accepted':'b-accepted','In Progress':'b-progress','Ready':'b-ready','Delivered':'b-delivered'};
  return `<span class="badge ${m[o.status]||''}">${esc(o.status)}</span>`;
}
function paymentBadge(o) {
  const bal = o.totalAmount - o.advancePaid;
  if (bal <= 0)       return `<span class="badge b-paid">Paid</span>`;
  if (o.advancePaid > 0) return `<span class="badge b-partial">Partial</span>`;
  return `<span class="badge b-unpaid">Unpaid</span>`;
}

function showModal(html) {
  document.getElementById('modalBox').innerHTML = html;

}
function closeModal() {

function overlayClick(e) { if (e.target.id === 'modalOverlay') closeModal(); }

function showAddBiz() {
  showModal(`
    <div class="modal-header"><h3>Add New Business</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Business Name *</label><input id="bN" placeholder="e.g. Sharma Printing Press" /></div>
      <div class="form-group"><label>Business Type</label><input id="bT" placeholder="e.g. Printing Press, Photo Studio" /></div>
      <div class="form-group"><label>Contact Phone</label><input id="bPh" placeholder="Owner mobile number" /></div>
      <div class="form-grid">
        <div class="form-group"><label>Login Username *</label><input id="bU" placeholder="username" /></div>
        <div class="form-group"><label>Password *</label><input id="bP" placeholder="password" /></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveBiz(null)">Create Business</button>
    </div>`);
}

function showEditBiz(id) {
  const b = getBusinesses().find(x => x.id === id);
  showModal(`
    <div class="modal-header"><h3>Edit Business</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Business Name *</label><input id="bN" value="${esc(b.name)}" /></div>
      <div class="form-group"><label>Business Type</label><input id="bT" value="${esc(b.type||'')}" /></div>
      <div class="form-group"><label>Contact Phone</label><input id="bPh" value="${esc(b.phone||'')}" /></div>
      <div class="form-grid">
        <div class="form-group"><label>Login Username *</label><input id="bU" value="${esc(b.username)}" /></div>
        <div class="form-group"><label>Password *</label><input id="bP" value="${esc(b.password)}" /></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveBiz('${id}')">Save Changes</button>
    </div>`);
}

function saveBiz(editId) {
  const name = document.getElementById('bN').value.trim();
  const user = document.getElementById('bU').value.trim();
  const pass = document.getElementById('bP').value.trim();
  if (!name||!user||!pass) { toast('Name, username and password are required','error'); return; }

  const list = getBusinesses();
  const dup = list.find(b => b.username === user && b.id !== editId);
  if (dup) { toast('Username already taken','error'); return; }

  if (editId) {
    const i = list.findIndex(b => b.id === editId);
    list[i] = { ...list[i], name, username:user, password:pass,
      type: document.getElementById('bT').value.trim(),
      phone: document.getElementById('bPh').value.trim() };
  } else {
    list.push({ id:genBizId(), name, username:user, password:pass,
      type: document.getElementById('bT').value.trim(),
      phone: document.getElementById('bPh').value.trim(),
      createdAt: new Date().toISOString() });
  }
  saveBizList(list);
  closeModal();
  toast(editId ? 'Business updated!' : 'Business created!', 'success');
  navigateTo('businesses');
}

function confirmDeleteBiz(id) {
  const biz = getBusinesses().find(b => b.id === id);
  showModal(`
    <div class="modal-header"><h3>Delete Business</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <p style="font-size:15px;margin-bottom:8px">Are you sure you want to delete <strong>${esc(biz.name)}</strong>?</p>
      <p style="color:var(--danger);font-size:13px">⚠ This will permanently delete the business and all its orders. This cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="deleteBiz('${id}')">Yes, Delete</button>
    </div>`);
}

function deleteBiz(id) {
  const list = getBusinesses().filter(b => b.id !== id);
  saveBizList(list);
  ls.del('of_ord_' + id);
  closeModal();
  toast('Business deleted','success');
  navigateTo('businesses');
}

// ══════════════════════════════════════
// OWNER — ADD ORDER
// ══════════════════════════════════════
function showAddOrder() {
  showModal(buildOrderForm(null));
}

function showEditOrder(orderId) {
  const o = getOrders(session.bizId).find(x => x.id === orderId);
  showModal(buildOrderForm(o));
}

function buildOrderForm(o, isDuplicate = false) {
  const isEdit = !!o && !isDuplicate;
  const prefill = isEdit || isDuplicate; // pre-fill data for both edit and duplicate
  const initSvc = o ? o.serviceType : SERVICE_TYPES[0];
  const bal = isEdit ? Math.max(0, o.totalAmount - o.advancePaid) : 0;
  const hasDiffCP = prefill && o.contactPerson && o.contactPerson !== o.customerName;
  return `
    <div class="modal-header">
      <h3>${isEdit ? 'Edit Order — ' + esc(o.id) : isDuplicate ? '↗ Reorder (copy of ' + esc(o.id) + ')' : 'New Order'}</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group span-2">
          <label>Customer Name / Organization *</label>
          <input id="fCN" placeholder="Individual name or company / shop name"
                 value="${prefill?esc(o.customerName):''}" oninput="syncContactPerson()" />
        </div>
        <div class="form-group span-2" style="margin-top:-6px;margin-bottom:4px">
          <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-weight:500;color:var(--gray-600)">
            <input type="checkbox" id="fSameCP" style="width:15px;height:15px;accent-color:var(--primary);cursor:pointer"
                   ${hasDiffCP ? '' : 'checked'}
                   onchange="toggleContactPerson()" />
            Contact person is same as customer name
          </label>
        </div>
        <div class="form-group">
          <label>Contact Person *</label>
          <input id="fCP" placeholder="Person to contact"
                 value="${prefill ? esc(o.contactPerson||o.customerName) : ''}"
                 ${hasDiffCP ? '' : 'style="background:var(--gray-50);color:var(--gray-500)" readonly'} />
        </div>
        <div class="form-group">
          <label>Contact Number *</label>
          <input id="fCM" type="tel" placeholder="10-digit mobile" value="${prefill?esc(o.customerMobile):''}" />
        </div>
        <div class="form-group">
          <label>Service Type *</label>
          <select id="fST" onchange="onServiceTypeChange(this)">
            ${SERVICE_TYPES.map(t => `<option value="${t}" ${initSvc===t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>Due Date</label>
          <input id="fDD" type="date" value="${isEdit&&o.dueDate?o.dueDate:''}" />
        </div>
        <div class="form-group">
          <label>Total Amount (₹) *</label>
          <input id="fTA" type="number" min="0" placeholder="0" value="${prefill?o.totalAmount:''}" oninput="calcBal()" />
        </div>
        <div class="form-group">
          <label>Advance Paid (₹)</label>
          <input id="fAP" type="number" min="0" placeholder="0" value="${isDuplicate?'0':(isEdit?o.advancePaid:'0')}" oninput="calcBal()" />
        </div>
      </div>

      <div style="background:var(--gray-50);border-radius:var(--r);padding:10px 14px;margin-bottom:4px;font-size:13px">
        Balance Due: <strong id="fBal" style="color:var(--danger)">${money(bal)}</strong>
      </div>

      <!-- Dynamic spec fields — swapped when service type changes -->
      <div id="specContainer">
        ${renderSpecFields(initSvc, prefill ? (o.specs||{}) : {})}
      </div>

      <div class="form-group">
        <label>Notes / Remarks</label>
        <textarea id="fNotes" placeholder="Special instructions, customer preferences…">${prefill?esc(o.notes):''}</textarea>
      </div>
      ${isEdit ? `
        <div class="form-group">
          <label>Status</label>
          <select id="fStatus">
            ${STATUS_FLOW.map(s => `<option value="${s}" ${o.status===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>` : ''}
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="${isEdit?`updateOrder('${o.id}')` : 'createOrder()'}">
        ${isEdit ? 'Save Changes' : 'Create Order'}
      </button>
    </div>`;
}

function calcBal() {
  const t = parseFloat(document.getElementById('fTA').value)||0;
  const a = parseFloat(document.getElementById('fAP').value)||0;
  document.getElementById('fBal').textContent = money(Math.max(0, t-a));
}

function readOrderForm() {
  const serviceType = document.getElementById('fST').value;
  const customerName = document.getElementById('fCN').value.trim();
  const sameCP = document.getElementById('fSameCP').checked;
  return {
    customerName,
    contactPerson:  sameCP ? customerName : document.getElementById('fCP').value.trim(),
    customerMobile: document.getElementById('fCM').value.trim(),
    serviceType,
    dueDate:        document.getElementById('fDD').value,
    totalAmount:    parseFloat(document.getElementById('fTA').value)||0,
    advancePaid:    parseFloat(document.getElementById('fAP').value)||0,
    notes:          document.getElementById('fNotes').value.trim(),
    specs:          readSpecFields(serviceType),
  };
}

function createOrder() {
  const d = readOrderForm();
  if (!d.customerName || !d.customerMobile || !d.totalAmount) {
    toast('Name, mobile and amount are required','error'); return;
  }
  const orders = getOrders(session.bizId);
  orders.push({ ...d, id: genOrderId(session.bizId), status:'Accepted',
    closed:false, closedAt:null, createdAt: new Date().toISOString() });
  saveOrders(session.bizId, orders);
  closeModal(); toast('Order created!','success'); navigateTo('orders');
}

function updateOrder(orderId) {
  const d = readOrderForm();
  if (!d.customerName || !d.customerMobile || !d.totalAmount) {
    toast('Name, mobile and amount are required','error'); return;
  }
  const orders = getOrders(session.bizId);
  const i = orders.findIndex(o => o.id === orderId);
  orders[i] = { ...orders[i], ...d, status: document.getElementById('fStatus').value };
  saveOrders(session.bizId, orders);
  closeModal(); toast('Order updated!','success'); navigateTo(currentView);
}

// ══════════════════════════════════════
// VIEW ORDER DETAIL
// ══════════════════════════════════════
function viewOrder(orderId) {
  const o = getOrders(session.bizId).find(x => x.id === orderId);
  if (!o) return;
  const stepIdx = STATUS_FLOW.indexOf(o.status);
  const bal = Math.max(0, o.totalAmount - o.advancePaid);
  const od  = isOverdue(o);

  const steps = STATUS_FLOW.map((s,i) => {
    const cls = i < stepIdx ? 's-done' : i === stepIdx ? 's-active' : '';
    return `<div class="step ${cls}">
      <div class="step-dot">${i < stepIdx ? '✓' : i+1}</div>
      <div class="step-label">${s}</div>
    </div>`;
  }).join('');

  showModal(`
    <div class="modal-header">
      <h3>${esc(o.id)} ${statusBadge(o)}</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      ${od ? `<div style="background:var(--danger-light);color:var(--danger);padding:10px 14px;border-radius:var(--r);font-size:13px;font-weight:600;margin-bottom:16px">⚠️ This order is OVERDUE — Due ${fmtDate(o.dueDate)}</div>` : ''}

      <div style="margin-bottom:18px">
        <div style="font-size:18px;font-weight:800">${esc(o.customerName)}</div>
        ${o.contactPerson && o.contactPerson !== o.customerName
          ? `<div style="font-size:13px;color:var(--gray-500);margin-top:2px">👤 ${esc(o.contactPerson)}</div>` : ''}
        <div style="font-size:14px;color:var(--gray-500);margin-top:2px">📞 ${esc(o.customerMobile)}</div>
      </div>

      <div class="info-grid">
        <div class="info-item"><div class="i-label">Service Type</div><div class="i-val">${esc(o.serviceType)}</div></div>
        <div class="info-item"><div class="i-label">Due Date</div><div class="i-val">${fmtDate(o.dueDate)}</div></div>
        <div class="info-item"><div class="i-label">Order Created</div><div class="i-val">${fmtDate(o.createdAt)}</div></div>
        <div class="info-item"><div class="i-label">Payment</div><div class="i-val">${paymentBadge(o)}</div></div>
      </div>

      <div style="font-size:12px;color:var(--gray-500);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Progress</div>
      <div class="status-steps">${steps}</div>

      <div class="pay-box">
        <div class="pay-row"><span class="pay-label">Total Amount</span><span class="pay-val">${money(o.totalAmount)}</span></div>
        <div class="pay-row"><span class="pay-label">Advance Paid</span><span class="pay-val" style="color:var(--success)">${money(o.advancePaid)}</span></div>
        <div class="pay-row"><span class="pay-label">Balance Due</span><span class="pay-val ${bal>0?'balance':''}">${money(bal)}</span></div>
      </div>

      ${renderSpecsDisplay(o.serviceType, o.specs||{})}
      ${o.notes ? `<div style="margin-top:4px"><div style="font-size:11px;color:var(--gray-400);text-transform:uppercase;font-weight:700;margin-bottom:4px">Notes</div><div style="font-size:13px;color:var(--gray-700);white-space:pre-wrap">${esc(o.notes)}</div></div>` : ''}
    </div>
    <div class="modal-footer" style="flex-wrap:wrap;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="printWorkSlip('${o.id}')" title="Print work slip">🖨️ Print</button>
      <button class="btn btn-ghost btn-sm" onclick="duplicateOrder('${o.id}')" title="Duplicate this order">↗ Reorder</button>
      ${o.closed
        ? `<span style="font-size:13px;color:var(--gray-400);flex:1;text-align:right">Closed on ${fmtDate(o.closedAt)}</span>`
        : `<button class="btn btn-danger btn-sm" onclick="confirmCloseOrder('${o.id}')">Close</button>
           <button class="btn btn-outline btn-sm" onclick="closeModal();showEditOrder('${o.id}')">Edit</button>
           ${stepIdx < STATUS_FLOW.length-1
             ? `<button class="btn btn-primary btn-sm" onclick="advanceStatus('${o.id}')">→ ${STATUS_FLOW[stepIdx+1]}</button>`
             : ''}
           <button class="btn btn-sm" style="background:#25d366;color:white" onclick="sendWhatsApp('${o.id}')">💬 WhatsApp</button>`
      }
    </div>`);
}

function advanceStatus(orderId) {
  const orders = getOrders(session.bizId);
  const i = orders.findIndex(o => o.id === orderId);
  const si = STATUS_FLOW.indexOf(orders[i].status);
  if (si < STATUS_FLOW.length-1) {
    orders[i].status = STATUS_FLOW[si+1];
    saveOrders(session.bizId, orders);
    toast(`Moved to "${orders[i].status}"`, 'success');
    closeModal(); navigateTo(currentView);
  }
}

function confirmCloseOrder(orderId) {
  showModal(`
    <div class="modal-header"><h3>Close Order</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <p style="font-size:15px;margin-bottom:8px">Close order <strong>${esc(orderId)}</strong>?</p>
      <p style="color:var(--gray-500);font-size:13px">It will be moved to History. You can still view it there anytime.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="closeOrder('${orderId}')">Yes, Close Order</button>
    </div>`);
}

function closeOrder(orderId) {
  const orders = getOrders(session.bizId);
  const i = orders.findIndex(o => o.id === orderId);
  orders[i].closed   = true;
  orders[i].closedAt = new Date().toISOString();
  saveOrders(session.bizId, orders);
  closeModal(); toast('Order closed and moved to History!','success');
  navigateTo(currentView);
}

// ══════════════════════════════════════
// SPEC SYSTEM
// ══════════════════════════════════════

// Custom options storage
function getCustomOpts(service, fieldId) {
  return JSON.parse(localStorage.getItem('of_cust_' + service + '_' + fieldId) || '[]');
}
function saveCustomOpt(service, fieldId, value) {
  const existing = getCustomOpts(service, fieldId);
  if (!existing.includes(value)) {
    existing.push(value);
    localStorage.setItem('of_cust_' + service + '_' + fieldId, JSON.stringify(existing));
  }
}

// Render spec fields section inside the order form
function renderSpecFields(service, existingSpecs) {
  const defs = SPEC_DEFS[service];
  if (!defs || !defs.length) return '';
  return `
    <div style="border-top:1px solid var(--gray-100);padding-top:14px;margin:14px 0 0">
      <div style="font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px">
        📋 ${esc(service)} Specifications
      </div>
      <div class="form-grid">
        ${defs.map(f => specFieldHTML(service, f, (existingSpecs||{})[f.id]||'')).join('')}
      </div>
    </div>`;
}

// Render a single spec dropdown (or textarea for freeform)
function specFieldHTML(service, f, currentValue) {
  // Freeform textarea (e.g. "Other" service type)
  if (!f.opts || f.opts.length === 0) {
    return `<div class="form-group span-2">
      <label>${esc(f.label)}</label>
      <textarea id="spec_${f.id}" placeholder="Describe the order…">${esc(currentValue)}</textarea>
    </div>`;
  }
  const customOpts = getCustomOpts(service, f.id);
  const allOpts = [...f.opts, ...customOpts];
  const svcAttr = esc(service).replace(/'/g,"\\'");
  return `<div class="form-group">
    <label>${esc(f.label)}</label>
    <select id="spec_${f.id}" onchange="onSpecChange('${svcAttr}','${f.id}',this)">
      <option value="">Select…</option>
      ${allOpts.map(o => `<option value="${esc(o)}" ${currentValue===o?'selected':''}>${esc(o)}</option>`).join('')}
      <option value="__custom__">➕ Add custom…</option>
    </select>
    <div id="cust_${f.id}" class="hidden" style="margin-top:6px;display:flex;gap:6px;align-items:center">
      <input id="cinp_${f.id}" placeholder="Type custom value…"
             style="flex:1;padding:8px 10px;border:1.5px solid var(--primary);border-radius:6px;font-size:13px"
             onkeydown="if(event.key==='Enter'){event.preventDefault();addCustomSpec('${svcAttr}','${f.id}')}" />
      <button type="button" onclick="addCustomSpec('${svcAttr}','${f.id}')" class="btn btn-primary btn-sm">Add</button>
      <button type="button" onclick="cancelCustom('${f.id}')" class="btn btn-outline btn-sm">✕</button>
    </div>
  </div>`;
}

// Contact person checkbox helpers
function syncContactPerson() {
  if (document.getElementById('fSameCP').checked) {
    document.getElementById('fCP').value = document.getElementById('fCN').value;
  }
}
function toggleContactPerson() {
  const cp = document.getElementById('fCP');
  const checked = document.getElementById('fSameCP').checked;
  if (checked) {
    cp.value = document.getElementById('fCN').value;
    cp.readOnly = true;
    cp.style.background = 'var(--gray-50)';
    cp.style.color = 'var(--gray-500)';
  } else {
    cp.readOnly = false;
    cp.style.background = '';
    cp.style.color = '';
    cp.focus();
  }
}

// Service type dropdown changed → re-render spec fields
function onServiceTypeChange(sel) {
  document.getElementById('specContainer').innerHTML = renderSpecFields(sel.value, {});
}

// Dropdown changed → show/hide custom input
function onSpecChange(service, fieldId, sel) {
  const custDiv = document.getElementById('cust_' + fieldId);
  if (sel.value === '__custom__') {
    custDiv.classList.remove('hidden');
    document.getElementById('cinp_' + fieldId).focus();
  } else {
    custDiv.classList.add('hidden');
  }
}

// Save custom option and select it
function addCustomSpec(service, fieldId) {
  const inp = document.getElementById('cinp_' + fieldId);
  const val = inp.value.trim();
  if (!val) { toast('Enter a value first', 'error'); return; }
  saveCustomOpt(service, fieldId, val);
  const sel = document.getElementById('spec_' + fieldId);
  const newOpt = document.createElement('option');
  newOpt.value = val; newOpt.textContent = val;
  sel.insertBefore(newOpt, sel.lastElementChild); // insert before ➕ Add custom…
  sel.value = val;
  document.getElementById('cust_' + fieldId).classList.add('hidden');
  inp.value = '';
  toast('"' + val + '" saved to ' + fieldId + ' options!', 'success');
}

// Cancel custom input
function cancelCustom(fieldId) {
  document.getElementById('spec_' + fieldId).value = '';
  document.getElementById('cust_' + fieldId).classList.add('hidden');
}

// Read all spec field values from the form
function readSpecFields(service) {
  const defs = SPEC_DEFS[service] || [];
  const specs = {};
  defs.forEach(f => {
    const el = document.getElementById('spec_' + f.id);
    if (el) specs[f.id] = el.value || '';
  });
  return specs;
}

// Display specs in the view order modal
function renderSpecsDisplay(service, specs) {
  const defs = SPEC_DEFS[service] || [];
  const filled = defs.filter(f => specs[f.id]);
  if (!filled.length) return '';
  return `
    <div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">
        📋 ${esc(service)} Specifications
      </div>
      <div class="info-grid" style="background:var(--gray-50);border-radius:var(--r);padding:14px 14px 6px">
        ${filled.map(f => `
          <div class="info-item" style="margin-bottom:8px">
            <div class="i-label">${esc(f.label)}</div>

function toggleSelectAll(cb) {
  document.querySelectorAll('.order-chk').forEach(el => el.checked = cb.checked);
  updateBulkBar();
}
function updateBulkBar() {
  const selected = document.querySelectorAll('.order-chk:checked');
  const bar = document.getElementById('bulkBar');
  if (!bar) return;
  if (selected.length > 0) {
    bar.classList.remove('hidden');
    document.getElementById('bulkCount').textContent = selected.length + ' order' + (selected.length > 1 ? 's' : '') + ' selected';
  } else {
    bar.classList.add('hidden');
  }
}
function applyBulkStatus() {
  const status = document.getElementById('bulkStatus').value;
  if (!status) { toast('Select a status first', 'error'); return; }
  const selected = [...document.querySelectorAll('.order-chk:checked')].map(el => el.dataset.id);
  if (!selected.length) return;
  const orders = getOrders(session.bizId);
  selected.forEach(id => {
    const i = orders.findIndex(o => o.id === id);
    if (i !== -1 && !orders[i].closed) orders[i].status = status;
  });
  saveOrders(session.bizId, orders);
  toast(selected.length + ' orders moved to "' + status + '"', 'success');
  navigateTo('orders');
}
function clearBulkSelection() {
  document.querySelectorAll('.order-chk').forEach(el => el.checked = false);
  const all = document.getElementById('chkAll');
  if (all) all.checked = false;
  updateBulkBar();
}

// ══════════════════════════════════════
// REVENUE DASHBOARD
// ══════════════════════════════════════
function renderRevenue() {
  const orders = getOrders(session.bizId);
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const prevMonthStart = new Date(now.getFullYear(), now.getMonth() - 1, 1);

  const thisMonth = orders.filter(o => new Date(o.createdAt) >= monthStart);
  const lastMonth = orders.filter(o => {
    const d = new Date(o.createdAt);
    return d >= prevMonthStart && d < monthStart;
  });

  function calcStats(list) {
    const billed    = list.reduce((s,o) => s + o.totalAmount, 0);
    const collected = list.reduce((s,o) => s + (o.closed ? o.totalAmount : o.advancePaid), 0);
    const pending   = list.filter(o => !o.closed).reduce((s,o) => s + Math.max(0, o.totalAmount - o.advancePaid), 0);
    return { billed, collected, pending, count: list.length };
  }

  const cur  = calcStats(thisMonth);
  const prev = calcStats(lastMonth);

  function delta(a, b) {
    if (!b) return '';
    const d = a - b;
    const pct = Math.round(Math.abs(d) / b * 100);
    const col = d >= 0 ? 'var(--success)' : 'var(--danger)';
    return `<span style="font-size:11px;color:${col};font-weight:700">${d>=0?'▲':'▼'} ${pct}% vs last month</span>`;
  }

  // Top 5 customers
  const custMap = {};
  orders.forEach(o => {
    const k = o.customerName;
    if (!custMap[k]) custMap[k] = { name:k, billed:0, count:0 };
    custMap[k].billed += o.totalAmount;
    custMap[k].count++;
  });
  const topCust = Object.values(custMap).sort((a,b) => b.billed - a.billed).slice(0,5);
  const maxBilled = topCust[0]?.billed || 1;

  // Last 7 days
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(now); d.setDate(d.getDate() - i);
    const ds = d.toDateString();
    const dayOrders = orders.filter(o => new Date(o.createdAt).toDateString() === ds);
    days.push({
      label: d.toLocaleDateString('en-IN',{weekday:'short'}) + '\n' + d.getDate(),
      billed: dayOrders.reduce((s,o) => s + o.totalAmount, 0),
    });
  }
  const maxDay = Math.max(...days.map(d => d.billed), 1);

  const mnth = now.toLocaleDateString('en-IN',{month:'long',year:'numeric'});

  return `
    <div class="page-header">
      <div><h1>Revenue & Intelligence</h1><p>${esc(session.bizName)} &bull; ${mnth}</p></div>
    </div>

    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card">
        <div class="s-label">Billed This Month</div>
        <div class="s-value" style="color:var(--primary)">${money(cur.billed)}</div>
        <div class="s-sub">${cur.count} orders &nbsp; ${delta(cur.billed,prev.billed)}</div>
      </div>
      <div class="stat-card">
        <div class="s-label">Collected This Month</div>
        <div class="s-value" style="color:var(--success)">${money(cur.collected)}</div>
        <div class="s-sub">${delta(cur.collected,prev.collected)}</div>
      </div>
      <div class="stat-card">
        <div class="s-label">Outstanding Balance</div>
        <div class="s-value" style="color:var(--danger)">${money(cur.pending)}</div>
        <div class="s-sub">Across all active orders</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">

      <!-- 7-day chart -->
      <div class="card">
        <div class="card-header"><h3>Last 7 Days — Orders Billed</h3></div>
        <div style="padding:20px">
          <div style="display:flex;align-items:flex-end;gap:8px;height:120px">
            ${days.map(d => {
              const h = d.billed ? Math.max(8, Math.round(d.billed / maxDay * 110)) : 4;
              return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
                <div style="font-size:9px;color:var(--gray-500);font-weight:700">${d.billed ? '₹'+Number(d.billed/1000).toFixed(0)+'k' : ''}</div>
                <div style="width:100%;background:${d.billed?'var(--primary)':'var(--gray-200)'};height:${h}px;border-radius:4px 4px 0 0;opacity:${d.billed?'1':'.4'}"></div>
                <div style="font-size:10px;color:var(--gray-400);white-space:pre-line;text-align:center;line-height:1.2">${d.label}</div>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>

      <!-- Top customers -->
      <div class="card">
        <div class="card-header"><h3>Top Customers</h3></div>
        <div style="padding:16px">
          ${topCust.length ? topCust.map((c,i) => `
            <div style="margin-bottom:12px">
              <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
                <span><strong>${i+1}. ${esc(c.name)}</strong> <span style="color:var(--gray-400);font-size:11px">${c.count} order${c.count>1?'s':''}</span></span>
                <span style="font-weight:700;color:var(--primary)">${money(c.billed)}</span>
              </div>
              <div style="height:6px;background:var(--gray-100);border-radius:3px;overflow:hidden">
                <div style="height:100%;background:var(--primary);width:${Math.round(c.billed/maxBilled*100)}%;border-radius:3px"></div>
              </div>
            </div>`).join('') :
            `<div style="color:var(--gray-400);font-size:13px;padding:20px 0;text-align:center">No orders yet</div>`}
        </div>
      </div>

    </div>

    <!-- All-time summary -->
    <div class="card">
      <div class="card-header"><h3>All-Time Summary</h3></div>
      <table>
        <thead><tr><th>Month</th><th>Orders</th><th>Billed</th><th>Collected</th><th>Pending</th></tr></thead>
        <tbody>
          ${(() => {
            const byMonth = {};
            orders.forEach(o => {
              const k = new Date(o.createdAt).toLocaleDateString('en-IN',{month:'short',year:'numeric'});
              if (!byMonth[k]) byMonth[k] = [];
              byMonth[k].push(o);
            });
            return Object.entries(byMonth).reverse().slice(0,6).map(([m, list]) => {
              const s = calcStats(list);
              return `<tr>
                <td><strong>${m}</strong></td>
                <td>${s.count}</td>
                <td>${money(s.billed)}</td>
                <td style="color:var(--success);font-weight:600">${money(s.collected)}</td>
                <td style="color:var(--danger);font-weight:600">${money(s.pending)}</td>
              </tr>`;
            }).join('') || `<tr><td colspan="5" style="text-align:center;color:var(--gray-400);padding:20px">No data yet</td></tr>`;
          })()}
        </tbody>
      </table>
    </div>`;
}
